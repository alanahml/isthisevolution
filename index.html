<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>isthisevolution</title>
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ══════════════════════════════════════════
       UPLOAD SCREEN
    ══════════════════════════════════════════ */
    #upload-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: #fff;
    }

    #drop-zone {
      border: 1px dashed #ccc;
      width: min(440px, 90vw);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease;
      position: relative;
      user-select: none;
    }

    #drop-zone.drag-over {
      border-color: #000;
      background: rgba(0, 0, 0, 0.02);
    }

    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #drop-zone-label {
      font-size: 12px;
      color: #aaa;
      line-height: 2.2;
      pointer-events: none;
    }

    #drop-zone-label strong {
      display: block;
      font-size: 13px;
      color: #333;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    /* Options panel */
    #options {
      margin-top: 2rem;
      width: min(440px, 90vw);
      font-size: 12px;
    }

    .option-group { margin-bottom: 1.4rem; }

    .option-group-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #bbb;
      margin-bottom: 0.6rem;
    }

    .radio-row,
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      margin-bottom: 0.4rem;
      cursor: pointer;
      color: #555;
      line-height: 1.5;
    }

    .radio-row input,
    .checkbox-row input {
      margin-top: 2px;
      accent-color: #000;
      cursor: pointer;
      flex-shrink: 0;
    }

    .radio-row label,
    .checkbox-row label { cursor: pointer; }

    #file-count {
      font-size: 11px;
      color: #bbb;
      margin-bottom: 1rem;
      min-height: 1.4em;
      letter-spacing: 0.02em;
    }

    #begin-btn {
      display: none;
      font-family: monospace;
      font-size: 12px;
      background: #000;
      color: #fff;
      border: none;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 150ms ease;
    }

    #begin-btn:hover { background: #333; }

    /* ══════════════════════════════════════════
       TIMELINE SCREEN
    ══════════════════════════════════════════ */
    #timeline-screen {
      position: fixed;
      inset: 0;
      display: none;
      background: #fff;
    }

    /* Center preview container */
    #preview-container {
      position: absolute;
      inset: 0 0 3rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    /* Empty state hint */
    #empty-hint {
      font-size: 11px;
      color: #ddd;
      letter-spacing: 0.05em;
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    /* Media elements */
    #preview-img,
    #preview-video {
      max-height: 75vh;
      max-width: 90vw;
      object-fit: contain;
      position: absolute;
      opacity: 0;
      transition: opacity 240ms ease;
      display: block;
      /*
        Corner-dominant edge fade — matches the reference:
        Two linear gradients intersected. At corners both are fading → full
        transparency. At edge midpoints only one fades → gentle fade.
        The result is a soft rounded-rectangle window aligned to the image bounds.
      */
      -webkit-mask-image:
        linear-gradient(to right,  transparent 0%, rgba(0,0,0,0.45) 9%, black 21%, black 79%, rgba(0,0,0,0.45) 91%, transparent 100%),
        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.45) 9%, black 21%, black 79%, rgba(0,0,0,0.45) 91%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask-image:
        linear-gradient(to right,  transparent 0%, rgba(0,0,0,0.45) 9%, black 21%, black 79%, rgba(0,0,0,0.45) 91%, transparent 100%),
        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.45) 9%, black 21%, black 79%, rgba(0,0,0,0.45) 91%, transparent 100%);
      mask-composite: intersect;
      mask-size: 100% 100%;
    }

    /*
      Residual vignette — very subtle, just softens the outermost pixel ring
      so the masked image boundary doesn't produce a faint hard edge on some
      displays. Pointer-events off so hover still reaches the scrubber.
    */
    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(
        ellipse 90% 85% at center,
        transparent 60%,
        rgba(255, 255, 255, 0.18) 78%,
        rgba(255, 255, 255, 0.55) 89%,
        white 100%
      );
    }

    /* Metadata panel — bottom-left, above scrubber */
    #metadata-panel {
      position: absolute;
      bottom: 3.75rem;
      left: 1.4rem;
      font-family: monospace;
      font-size: 12px;
      color: #777;
      line-height: 1.75;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    #metadata-panel.visible { opacity: 1; }

    #m-age {
      color: #111;
      font-size: 13px;
      letter-spacing: -0.02em;
    }

    #m-index { color: #bbb; }

    #face-status {
      margin-top: 0.15rem;
      color: #ccc;
      font-size: 11px;
    }

    /* Scrubber strip */
    #scrubber {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3rem;
      display: flex;
      align-items: center;
      padding: 0 1.4rem;
      gap: 2px;
      overflow-x: auto;
      overflow-y: hidden;
      background: #fff;
      scrollbar-width: none;
      z-index: 4;
    }

    #scrubber::-webkit-scrollbar { display: none; }

    .bar {
      flex: 0 0 0.5rem;
      height: 1rem;
      background: #e0e0e0;
      border-radius: 1px;
      cursor: pointer;
      transition: background 80ms ease, transform 100ms ease;
      will-change: transform;
    }

    .bar:hover {
      background: #aaa;
      transform: scaleY(1.25);
    }

    .bar.active          { background: #111; }
    .bar.active:hover    { background: #111; }

    /* Back link */
    #back-btn {
      position: fixed;
      bottom: 3.75rem;
      right: 1.4rem;
      font-family: monospace;
      font-size: 11px;
      color: #ccc;
      cursor: pointer;
      z-index: 5;
      letter-spacing: 0.04em;
      border: none;
      background: none;
      padding: 0;
      transition: color 150ms;
    }

    #back-btn:hover { color: #999; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     UPLOAD SCREEN
══════════════════════════════════════════════════ -->
<div id="upload-screen">

  <div id="drop-zone">
    <input
      type="file"
      id="file-input"
      multiple
      accept=".svg,.png,.jpg,.jpeg,.gif,.mp4,.mov,image/svg+xml,image/png,image/jpeg,image/gif,video/mp4,video/quicktime"
    >
    <div id="drop-zone-label">
      <strong>drop files here</strong>
      svg · png · jpg · gif · mp4 · mov
    </div>
  </div>

  <div id="options">

    <div class="option-group">
      <div class="option-group-label">order on timeline</div>

      <label class="radio-row">
        <input type="radio" name="sort" value="age" checked>
        <span>by age &nbsp;<span style="color:#ccc">oldest → newest (last modified)</span></span>
      </label>

      <label class="radio-row">
        <input type="radio" name="sort" value="captured">
        <span>by date captured &nbsp;<span style="color:#ccc">oldest → newest (exif / last modified)</span></span>
      </label>

      <label class="radio-row">
        <input type="radio" name="sort" value="filename">
        <span>by file name &nbsp;<span style="color:#ccc">a → z</span></span>
      </label>
    </div>

    <div class="option-group">
      <div class="option-group-label">focus</div>
      <label class="checkbox-row">
        <input type="checkbox" id="face-lock-cb">
        <span>
          face / object lock
          <span style="color:#ccc">— auto-detect subjects and keep them centered while scrubbing</span>
        </span>
      </label>
    </div>

    <div id="file-count"></div>
    <button id="begin-btn">view timeline →</button>

  </div>
</div>

<!-- ══════════════════════════════════════════════════
     TIMELINE SCREEN
══════════════════════════════════════════════════ -->
<div id="timeline-screen">

  <div id="preview-container">
    <div id="empty-hint">hover a bar to begin</div>
    <img id="preview-img" alt="">
    <video id="preview-video" muted loop playsinline></video>
    <div id="vignette"></div>
  </div>

  <div id="metadata-panel">
    <div id="m-age"></div>
    <div id="m-datetime"></div>
    <div id="m-name"></div>
    <div id="m-type"></div>
    <div id="m-index"></div>
    <div id="face-status"></div>
  </div>

  <button id="back-btn">← back</button>

  <div id="scrubber"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
const state = {
  files:           [],       // FileEntry[]
  sortOrder:       'age',    // 'age' | 'captured' | 'filename'
  faceLockEnabled: false,
  currentIndex:    -1,
  isTransitioning: false,
  blazefaceModel:  null,
  pendingIndex:    -1,
  rafPending:      false,
};

// FileEntry:
// { file, name, ext, type ('image'|'video'), objectURL,
//   lastModified (ms), capturedAt (ms), faceCenter: null | {cx,cy} }

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initUploadScreen();
  document.addEventListener('keydown', handleKeydown);
});

// ══════════════════════════════════════════════════════════════
//  UPLOAD SCREEN
// ══════════════════════════════════════════════════════════════
function initUploadScreen() {
  const zone      = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const beginBtn  = document.getElementById('begin-btn');
  const backBtn   = document.getElementById('back-btn');

  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });

  zone.addEventListener('dragleave', e => {
    if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
  });

  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', () => {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });

  document.querySelectorAll('input[name="sort"]').forEach(r => {
    r.addEventListener('change', () => { state.sortOrder = r.value; });
  });

  document.getElementById('face-lock-cb').addEventListener('change', e => {
    state.faceLockEnabled = e.target.checked;
  });

  beginBtn.addEventListener('click', () => {
    if (state.files.length) enterTimeline();
  });

  backBtn.addEventListener('click', () => {
    document.getElementById('timeline-screen').style.display = 'none';
    document.getElementById('upload-screen').style.display   = 'flex';
    // Reset preview state so re-entering works cleanly
    state.currentIndex    = -1;
    state.isTransitioning = false;
    state.pendingIndex    = -1;
    document.getElementById('metadata-panel').classList.remove('visible');
    document.getElementById('empty-hint').style.display    = '';
    document.getElementById('preview-img').style.opacity   = '0';
    document.getElementById('preview-video').style.opacity = '0';
    document.getElementById('preview-video').src           = '';
    document.getElementById('face-status').textContent     = '';
  });
}

// ══════════════════════════════════════════════════════════════
//  FILE PROCESSING
// ══════════════════════════════════════════════════════════════
const ALLOWED_EXTS = new Set(['svg', 'png', 'jpg', 'jpeg', 'gif', 'mp4', 'mov']);
const VIDEO_EXTS   = new Set(['mp4', 'mov', 'webm']);

async function handleFiles(fileList) {
  const raw = Array.from(fileList).filter(f =>
    ALLOWED_EXTS.has(f.name.split('.').pop().toLowerCase())
  );
  if (!raw.length) return;

  const countEl = document.getElementById('file-count');
  countEl.textContent = `processing ${raw.length} file${raw.length !== 1 ? 's' : ''}…`;

  // Revoke any existing object URLs before replacing
  state.files.forEach(e => URL.revokeObjectURL(e.objectURL));

  const entries = await Promise.all(raw.map(processFile));
  state.files = entries;
  sortFiles();

  countEl.textContent = `${state.files.length} file${state.files.length !== 1 ? 's' : ''} ready`;
  document.getElementById('begin-btn').style.display = 'inline-block';
}

async function processFile(file) {
  const ext     = file.name.split('.').pop().toLowerCase();
  const isVideo = VIDEO_EXTS.has(ext);

  let capturedAt = file.lastModified;
  if (!isVideo) {
    const d = await getEXIFDate(file);
    if (d) capturedAt = d.getTime();
  }

  return {
    file,
    name:         file.name,
    ext,
    type:         isVideo ? 'video' : 'image',
    objectURL:    URL.createObjectURL(file),
    lastModified: file.lastModified,
    capturedAt,
    faceCenter:   null,
  };
}

async function getEXIFDate(file) {
  try {
    const data = await exifr.parse(file, ['DateTimeOriginal', 'CreateDate', 'DateTime']);
    if (!data) return null;
    return data.DateTimeOriginal || data.CreateDate || data.DateTime || null;
  } catch {
    return null;
  }
}

function sortFiles() {
  const order = state.sortOrder;
  state.files.sort((a, b) => {
    if (order === 'age')      return a.lastModified - b.lastModified;
    if (order === 'captured') return a.capturedAt   - b.capturedAt;
    if (order === 'filename') return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
    return 0;
  });
}

// ══════════════════════════════════════════════════════════════
//  ENTER TIMELINE
// ══════════════════════════════════════════════════════════════
function enterTimeline() {
  sortFiles(); // apply any radio change made after file drop

  document.getElementById('upload-screen').style.display   = 'none';
  document.getElementById('timeline-screen').style.display = 'block';

  buildScrubber();
  initScrubber();

  if (state.faceLockEnabled) {
    runFaceDetectionPass();
  }
}

// ══════════════════════════════════════════════════════════════
//  SCRUBBER
// ══════════════════════════════════════════════════════════════
function buildScrubber() {
  const scrubber = document.getElementById('scrubber');
  scrubber.innerHTML = '';
  const frag = document.createDocumentFragment();
  state.files.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className    = 'bar';
    bar.dataset.index = i;
    frag.appendChild(bar);
  });
  scrubber.appendChild(frag);
}

function initScrubber() {
  const scrubber = document.getElementById('scrubber');
  let isDragging = false;

  function schedulePreview(i) {
    state.pendingIndex = i;
    if (!state.rafPending) {
      state.rafPending = true;
      requestAnimationFrame(() => {
        state.rafPending = false;
        showPreview(state.pendingIndex);
      });
    }
  }

  scrubber.addEventListener('pointermove', e => {
    const bar = e.target.closest('.bar');
    if (bar) {
      schedulePreview(parseInt(bar.dataset.index, 10));
    } else if (isDragging) {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const dragged = el && el.closest('.bar');
      if (dragged) schedulePreview(parseInt(dragged.dataset.index, 10));
    }
  });

  scrubber.addEventListener('pointerdown', e => {
    isDragging = true;
    scrubber.setPointerCapture(e.pointerId);
    const bar = e.target.closest('.bar');
    if (bar) schedulePreview(parseInt(bar.dataset.index, 10));
  });

  scrubber.addEventListener('pointerup',     () => { isDragging = false; });
  scrubber.addEventListener('pointercancel', () => { isDragging = false; });
}

function highlightBar(index) {
  document.querySelectorAll('.bar').forEach((b, i) => {
    b.classList.toggle('active', i === index);
  });
}

// ══════════════════════════════════════════════════════════════
//  PREVIEW / CROSSFADE
// ══════════════════════════════════════════════════════════════
async function showPreview(index) {
  if (index === state.currentIndex || state.isTransitioning) return;
  state.isTransitioning = true;

  const entry    = state.files[index];
  const img      = document.getElementById('preview-img');
  const vid      = document.getElementById('preview-video');
  const isVideo  = entry.type === 'video';
  const incoming = isVideo ? vid : img;
  const outgoing = isVideo ? img : vid;

  // Hide empty hint on first preview
  document.getElementById('empty-hint').style.display = 'none';

  // Pause outgoing video if needed
  if (!isVideo && !vid.paused) vid.pause();

  // Set new source
  if (isVideo) {
    vid.src = entry.objectURL;
    vid.onerror = () => {
      document.getElementById('m-name').textContent =
        entry.name + '  (format may not play in this browser)';
    };
    vid.load();
  } else {
    img.src = entry.objectURL;
  }

  // Cross-fade: fade out outgoing, fade in incoming simultaneously
  outgoing.style.opacity = '0';
  incoming.style.opacity = '1';

  await sleep(260); // match CSS transition duration

  if (isVideo) {
    vid.play().catch(() => {});
  }

  applyFaceOffset(entry, incoming);
  updateMetadata(entry, index);
  highlightBar(index);

  state.currentIndex    = index;
  state.isTransitioning = false;

  // Serve the latest pending index if it changed during transition
  if (state.pendingIndex !== index) {
    const next = state.pendingIndex;
    if (next >= 0 && next < state.files.length) {
      showPreview(next);
    }
  }
}

function applyFaceOffset(entry, el) {
  if (!entry.faceCenter || !state.faceLockEnabled) {
    el.style.transform = '';
    return;
  }
  const { cx, cy } = entry.faceCenter;
  const w = el.naturalWidth  || el.videoWidth  || el.offsetWidth  || 1;
  const h = el.naturalHeight || el.videoHeight || el.offsetHeight || 1;

  // Shift so detected face center aligns with viewport center
  const dx = (0.5 - cx) * w;
  const dy = (0.5 - cy) * h;

  // Clamp so we don't push the image entirely off-screen
  const maxDx = w * 0.35;
  const maxDy = h * 0.35;
  el.style.transform = `translate(${clamp(dx, -maxDx, maxDx)}px, ${clamp(dy, -maxDy, maxDy)}px)`;
}

// ══════════════════════════════════════════════════════════════
//  METADATA
// ══════════════════════════════════════════════════════════════
function updateMetadata(entry, index) {
  const date = new Date(entry.capturedAt);
  document.getElementById('m-age').textContent      = formatElapsed(date);
  document.getElementById('m-datetime').textContent = formatDateTime(date);
  document.getElementById('m-name').textContent     = entry.name;
  document.getElementById('m-type').textContent     =
    (entry.file.type || entry.ext.toUpperCase()).toUpperCase();
  document.getElementById('m-index').textContent    = `#${index + 1} of ${state.files.length}`;
  document.getElementById('metadata-panel').classList.add('visible');
}

// Archival day count: "2,847 days elapsed"
function formatElapsed(date) {
  const days = Math.max(0, Math.floor((Date.now() - date.getTime()) / 86_400_000));
  return days.toLocaleString('en-US') + ' days elapsed';
}

// "15:32:07  ·  March 14  ·  2019"
function formatDateTime(date) {
  const hms      = date.toTimeString().slice(0, 8);
  const monthDay = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  const year     = date.getFullYear();
  return `${hms}  ·  ${monthDay}  ·  ${year}`;
}

// ══════════════════════════════════════════════════════════════
//  KEYBOARD NAVIGATION
// ══════════════════════════════════════════════════════════════
function handleKeydown(e) {
  if (document.getElementById('timeline-screen').style.display === 'none') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = Math.min(state.currentIndex + 1, state.files.length - 1);
    if (next !== state.currentIndex) { showPreview(next); scrollBarIntoView(next); }
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = Math.max(state.currentIndex - 1, 0);
    if (prev !== state.currentIndex) { showPreview(prev); scrollBarIntoView(prev); }
  }
}

function scrollBarIntoView(index) {
  const bars = document.querySelectorAll('.bar');
  if (bars[index]) bars[index].scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════════
//  FACE DETECTION  (lazy-loaded only when face-lock is enabled)
// ══════════════════════════════════════════════════════════════
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s   = document.createElement('script');
    s.src     = src;
    s.onload  = resolve;
    s.onerror = () => reject(new Error(`Could not load: ${src}`));
    document.head.appendChild(s);
  });
}

async function loadBlazefaceScripts() {
  if (window.blazeface) return;
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.4.0/dist/tf.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.js');
  } catch {
    document.getElementById('face-status').textContent = 'face detection unavailable (network error)';
    throw new Error('blazeface load failed');
  }
}

async function ensureBlazefaceModel() {
  if (state.blazefaceModel) return state.blazefaceModel;
  document.getElementById('face-status').textContent = 'loading face detection model…';
  await loadBlazefaceScripts();
  state.blazefaceModel = await blazeface.load();
  return state.blazefaceModel;
}

async function detectFaceCenter(entry) {
  try {
    const model = await ensureBlazefaceModel();

    const el       = new Image();
    el.crossOrigin = 'anonymous';
    el.src         = entry.objectURL;
    await new Promise((res, rej) => { el.onload = res; el.onerror = rej; });

    const predictions = await model.estimateFaces(el, false);
    if (!predictions || !predictions.length) return null;

    const p  = predictions[0];
    // Handle both plain arrays and typed arrays (varies by TF.js version)
    const tl = p.topLeft;
    const br = p.bottomRight;
    const x1 = Array.isArray(tl) ? tl[0] : tl.arraySync()[0];
    const y1 = Array.isArray(tl) ? tl[1] : tl.arraySync()[1];
    const x2 = Array.isArray(br) ? br[0] : br.arraySync()[0];
    const y2 = Array.isArray(br) ? br[1] : br.arraySync()[1];

    return {
      cx: (x1 + x2) / 2 / el.naturalWidth,
      cy: (y1 + y2) / 2 / el.naturalHeight,
    };
  } catch {
    return null;
  }
}

async function runFaceDetectionPass() {
  const statusEl = document.getElementById('face-status');
  const imgFiles = state.files.filter(f => f.type === 'image');
  const total    = imgFiles.length;
  let   detected = 0;

  if (!total) {
    statusEl.textContent = 'no images to analyze';
    return;
  }

  for (let i = 0; i < imgFiles.length; i++) {
    const entry = imgFiles[i];
    statusEl.textContent = `analyzing… ${i + 1} / ${total}`;

    const center     = await detectFaceCenter(entry);
    entry.faceCenter = center;
    if (center) detected++;

    // Live-update if this file is currently displayed
    if (state.files[state.currentIndex] === entry) {
      const el = document.getElementById('preview-img');
      applyFaceOffset(entry, el);
    }
  }

  statusEl.textContent =
    detected > 0
      ? `face lock · ${detected} / ${total} detected`
      : 'face lock · no faces detected';
}
